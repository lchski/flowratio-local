<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Report</title>
        <style>
        </style>
        <link rel="stylesheet" type="text/css" href="vendor/d3-flamegraph.css">
    </head>
    <body>
        <h1>FlowRatio Report</h1>
        <div id="app">Loading (this can take a few seconds the first time)...</div>
        <!-- These are way too fat to import as modules. -->
        <script type="text/javascript" src="vendor/d3.v7.js"></script>
        <script type="text/javascript" src="vendor/d3-flamegraph.min.js"></script>
        <script type="text/javascript" src="vendor/d3-flamegraph-tooltip.min.js"></script>
        <script src="vendor/preact.umd.js"></script>
        <script src="vendor/preact-hooks.umd.js"></script>
        <script src="vendor/immutable.js"></script>
        <script src="vendor/dayjs.min.js"></script>
        <script type="module">
         const { h, render, createContext } = preact;
         const { useState, useEffect, useRef } = preactHooks;
         const { List } = Immutable;

         function useWindowWidth() {
             const [windowWidth, setWindowWidth] = useState(window.innerWidth);

             useEffect(() => {
                 const onResize = () => setWindowWidth(window.innerWidth);
                 window.addEventListener("resize", onResize);
                 return () => window.removeEventListener("resize", onResize);
             }, []);

             return windowWidth;
         }

         function FlameGraph({ samples }) {
             // Recursive method to add a sample to hierarchy.
             const addChild = (node, tags, lambda) => {
                 node.value += +lambda;
                 node.samples++;
                 if (tags.length > 0) {
                     const next = tags.shift();
                     for (const child of node.children) {
                         if (child.name === next) {
                             addChild(child, tags, lambda);
                             return;
                         }
                     }
                     // If we get here, the child was not found.
                     const child = { name: next, value: 0, samples: 0, children: [] };
                     node.children.push(child);
                     addChild(child, tags, lambda);
                 }
             }

             // Reference to container element from flamegraph svg.
             const container = useRef(null);

             const windowWidth = useWindowWidth();

             useEffect(() => {
                 // Find the relevant samples to show.
                 const isInactive = s => s.tag.match(/^(off|afk)$/);
                 const isOld = s => dayjs(s.time).add(14, 'days') < dayjs();
                 const nonInactive =
                     samples.filter(s => ! isInactive(s) && ! isOld(s))
                            .sortBy(s => s.tag);

                 // Build hierarchy from samples.
                 let totalTime = 0;
                 let sampleCount = 0;
                 let data = { name: 'active', value: 0, samples: 0, children: [] };
                 for (const sample of nonInactive) {
                     const tags = sample.tag.split(':');
                     addChild(data, tags, sample.lambda);
                     totalTime += +sample.lambda;
                     sampleCount++;
                 }

                 // Display information on each bar.
                 const tooltipString = d => {
                     // This is constructing a 90 % interval for the hours
                     // through VERY improvised means.
                     //
                     // Originally, this used binomial intervals to estimate a
                     // 90 % interval of the fraction of time spent on each thing,
                     // but when converting this to hours it behaves weirdly.
                     // E.g. if you spend 100 % of your time on one thing,
                     // it looks like it's incredibly certain of how the amount
                     // of time spent on this thing, when in fact it's only
                     // somewhat certain of the fraction.
                     //
                     // So I'm trying instead going through the Poisson
                     // distribution and the sample count but bear in mind
                     // I have absolutely no idea what I'm doing here!

                     const cv = Math.sqrt(d.data.samples)/d.data.samples;
                     const sd = cv * d.data.value;
                     const midHours = Math.round(d.data.value/60/60);
                     const lowerHours = Math.round((d.data.value - 1.645*sd)/60/60);
                     const upperHours = Math.round((d.data.value + 1.645*sd)/60/60);
                     const hourRange = `${lowerHours}–[${midHours}]–${upperHours} h`;

                     const perc = `${Math.round(100*(d.x1 - d.x0))} %`;
                     return `${d.data.name}, ${perc} (${hourRange})`;
                 }

                 // Clear any previous flamegraph before rendering a new one,
                 // so old SVG elements and their stale tooltip event handlers
                 // don't conflict with the new render.
                 d3.select(container.current).selectAll('*').remove();

                 // Create flamechart.
                 const rem = parseFloat(getComputedStyle(document.documentElement).fontSize);
                 const chart = flamegraph()
                     .width(Math.min(windowWidth-4*rem, 80*rem))
                     .tooltip(flamegraph.tooltip.defaultFlamegraphTooltip().text(tooltipString));

                 d3.select(container.current)
                   .datum(data)
                   .call(chart);

             }, [samples]);

             return h('div', null, [
                 h('h2', null, ['Flamegraph']),
                 h('div', { ref: container}),
                 h('p', null, ['(hover for details, click to zoom)']),
             ]);
         }

         function ShowHistory({ samples }) {
             return h('div', null, [
                 h('h2', null, [ 'Log' ]),
                 h('ul', null, [
                     ...samples.reverse().map(s => h('li', null, [dayjs(s.time).format() + ' ' + s.tag]))
                 ])
             ]);
         }


         function App() {
             const [samples, setSamples] = useState(() => {
                 const json = JSON.parse(window.localStorage.getItem('fr_samples'));
                 return List(json ?? []).sortBy(s => s.time);
             });

             // Adapted from index.html's csv.import. Updates state only (no
             // localStorage write) so it's safe in both Firefox (where
             // report.html has its own separate localStorage scope) and Chrome
             // (where localStorage is shared with index.html).
             const importCsv = () => {
                 const input = document.createElement("input");
                 input.type = "file";
                 input.accept = '.csv,text/plain';
                 input.addEventListener('change', ev => {
                     const reader = new FileReader();
                     reader.onload = ev => {
                         const data = ev.target.result;
                         const rows = data.split('\n');

                         const header = rows.shift();
                         const hasNamespace = header === 'time,tag,lambda,namespace';
                         if (!hasNamespace && header !== 'time,tag,lambda') {
                             window.alert('Did not recognise file format');
                             return;
                         }

                         const existingKeys = new Set(
                             samples
                                 .filter(s => s.tag)
                                 .map(s => `${s.namespace ?? ''}|${dayjs(s.time).startOf('second').toISOString()}`)
                                 .toArray()
                         );

                         const incoming = rows
                             .map(raw => {
                                 const fields = raw.split(',');
                                 return { time: fields[0], tag: fields[1], lambda: fields[2], namespace: hasNamespace ? (fields[3] || null) : null };
                             })
                             .filter(s => s.tag);

                         const newSamples = incoming.filter(s =>
                             !existingKeys.has(`${s.namespace ?? ''}|${dayjs(s.time).startOf('second').toISOString()}`)
                         );
                         const duplicateCount = incoming.length - newSamples.length;

                         setSamples(samples.concat(List(newSamples)).sortBy(s => s.time));

                         const parts = [`Imported ${newSamples.length} new record${newSamples.length !== 1 ? 's' : ''}.`];
                         if (duplicateCount > 0) {
                             parts.push(`Skipped ${duplicateCount} duplicate${duplicateCount !== 1 ? 's' : ''} (same namespace and timestamp already in your data).`);
                         }
                         window.alert(parts.join(' '));
                     };
                     reader.readAsText(ev.target.files[0]);
                 });
                 input.dispatchEvent(new MouseEvent("click"));
             };

             // Render application contents.
             return h('main', null, [
                 h('p', null, 'Displaying last 14 days'),
                 h('p', null, [ h('button', { onClick: importCsv }, ['Load CSV']) ]),
                 h(FlameGraph, { samples }),
                 h(ShowHistory, { samples })
             ]);
         }

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);
        </script>
    </body>
</html>
