<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Report</title>
        <style>
        </style>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/d3-flame-graph@4.1.3/dist/d3-flamegraph.css">
    </head>
    <body>
        <div id="app">Loading (this can take a few seconds the first time)...</div>
        <!-- These are way too fat to import as modules. -->
        <script type="text/javascript" src="https://d3js.org/d3.v7.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/d3-flame-graph@4.1.3/dist/d3-flamegraph.min.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/d3-flame-graph@4.1.3/dist/d3-flamegraph-tooltip.min.js"></script>
        <script type="module">
         import { h, render, createContext } from 'https://unpkg.com/preact@latest?module';
         import { useState, useEffect, useRef } from 'https://unpkg.com/preact@latest/hooks/dist/hooks.module.js?module';
         import { List } from 'https://unpkg.com/immutable@latest?module';
         import dayjs from 'https://cdn.skypack.dev/dayjs';

         function useWindowWidth() {
             const [windowWidth, setWindowWidth] = useState(window.innerWidth);

             useEffect(() => {
                 const onResize = () => setWindowWidth(window.innerWidth);
                 window.addEventListener("resize", onResize);
                 return () => window.removeEventListener("resize", onResize);
             }, []);

             return windowWidth;
         }

         function FlameGraph({ samples }) {
             // Recursive method to add a sample to hierarchy.
             const addChild = (node, tags, lambda) => {
                 node.value += +lambda;
                 node.samples++;
                 if (tags.length > 0) {
                     const next = tags.shift();
                     for (const child of node.children) {
                         if (child.name === next) {
                             addChild(child, tags, lambda);
                             return;
                         }
                     }
                     // If we get here, the child was not found.
                     const child = { name: next, value: 0, samples: 0, children: [] };
                     node.children.push(child);
                     addChild(child, tags, lambda);
                 }
             }

             // Reference to container element from flamegraph svg.
             const container = useRef(null);

             const windowWidth = useWindowWidth();

             useEffect(() => {
                 // Find the relevant samples to show.
                 const isInactive = s => s.tag.match(/^(off|afk)$/);
                 const isOld = s => dayjs(s.time).add(7, 'days') < dayjs();
                 const nonInactive =
                     samples.filter(s => ! isInactive(s) && ! isOld(s))
                            .sortBy(s => s.tag);

                 // Build hierarchy from samples.
                 let totalTime = 0;
                 let sampleCount = 0;
                 let data = { name: 'active', value: 0, samples: 0, children: [] };
                 for (const sample of nonInactive) {
                     const tags = sample.tag.split(':');
                     addChild(data, tags, sample.lambda);
                     totalTime += +sample.lambda;
                     sampleCount++;
                 }

                 // Display information on each bar.
                 const tooltipString = d => {
                     // This is constructing a 90 % interval for the hours
                     // through VERY improvised means.
                     //
                     // Originally, this used binomial intervals to estimate a
                     // 90 % interval of the fraction of time spent on each thing,
                     // but when converting this to hours it behaves weirdly.
                     // E.g. if you spend 100 % of your time on one thing,
                     // it looks like it's incredibly certain of how the amount
                     // of time spent on this thing, when in fact it's only
                     // somewhat certain of the fraction.
                     //
                     // So I'm trying instead going through the Poisson
                     // distribution and the sample count but bear in mind
                     // I have absolutely no idea what I'm doing here!

                     const cv = Math.sqrt(d.data.samples)/d.data.samples;
                     const sd = cv * d.data.value;
                     const lowerHours = Math.round((d.data.value - 1.645*sd)/60/60);
                     const upperHours = Math.round((d.data.value + 1.645*sd)/60/60);
                     const hourRange = `${lowerHours}–${upperHours} h`;

                     const perc = `${Math.round(100*(d.x1 - d.x0))} %`;
                     return `${d.data.name}, ${perc} (${hourRange})`;
                 }

                 // Create flamechart.
                 const rem = parseFloat(getComputedStyle(document.documentElement).fontSize);
                 const chart = flamegraph()
                     .width(Math.min(windowWidth-4*rem, 80*rem))
                     .tooltip(flamegraph.tooltip.defaultFlamegraphTooltip().text(tooltipString));

                 d3.select(container.current)
                   .datum(data)
                   .call(chart);

             }, [samples]);

             return h('div', null, [
                 h('h2', null, ['Flamegraph']),
                 h('div', { ref: container}),
                 h('p', null, ['(hover for details, click to zoom)']),
             ]);
         }

         function ShowHistory({ samples }) {
             return h('div', null, [
                 h('h2', null, [ 'Log' ]),
                 h('ul', null, [
                     ...samples.reverse().map(s => h('li', null, [dayjs(s.time).format() + ' ' + s.tag]))
                 ])
             ]);
         }


         function App() {
             const json = JSON.parse(window.localStorage.getItem('fr_samples'));
             const samples = List(json ?? []);

             // Render application contents.
             return h('main', null, [
                 h('h1', null, 'Last 7 days'),
                 h(FlameGraph, { samples }),
                 h(ShowHistory, { samples })
             ]);
         }

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);
        </script>
    </body>
</html>
