<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Report</title>
        <style>
        </style>
    </head>
    <body>
        <div id="app">Loading (this can take a few seconds the first time)...</div>
        <script type="module">
         import { h, render, createContext } from 'https://unpkg.com/preact@latest?module';
         import { useState, useEffect, useRef } from 'https://unpkg.com/preact@latest/hooks/dist/hooks.module.js?module';
         import { List } from 'https://unpkg.com/immutable@latest?module';
         import dayjs from 'https://cdn.skypack.dev/dayjs';

         function TimeFraction({ samples }) {
             const isInactive = s => s.tag.match(/^(off|afk)$/);
             const isOld = s => dayjs(s.time).add(7, 'days') < dayjs();
             const nonInactive =
                 samples.filter(s => ! isInactive(s) && ! isOld(s));

             let counts = {};
             let total = 0;
             let totalTime = 0;
             for (const sample of nonInactive) {
                 const tag = sample.tag.split(':')[0];
                 if (! counts[tag]) counts[tag] = 0;
                 counts[tag]++;
                 total++;
                 totalTime += parseInt(sample.lambda);
             }
             for (const tag of Object.keys(counts)) {
                 counts[tag] /= total;
             }

             const viz = List(Object.keys(counts))
                 .sortBy(k => counts[k])
                 .reverse()
                 .map(tag => {
                     const frac = counts[tag];
                     const hours = Math.round(frac*totalTime/60/60*10)/10;
                     const sd = Math.sqrt(frac*(1-frac)/total);

                     // Agresti–Coull this!
                     const lower = Math.max(0, frac - 1.645*sd);
                     const upper = Math.min(1, frac + 1.645*sd);

                     const barwidth = 50;
                     const labelwidth = 20;
                     const label = tag.padStart(labelwidth, ' ').substring(0, labelwidth);
                     const perc = `${Math.round(frac*100)} %`.padStart(5, ' ');
                     const hrs = `(${hours} h)`.padStart(8, ' ');
                     const lbar = ''.padStart(100*lower, ' ');
                     const ulbar = ''.padStart(100*(frac-lower)-1, '-');
                     const uubar = ''.padStart(100*(upper-frac), '-');
                     const empty = ''.padStart(100*(1 - upper), ' ');
                     return `${label} ${perc} ${hrs} |${lbar}${ulbar}@${uubar}${empty}|`;
                 })
                 .join('\n');

             const totalHours = Math.round(totalTime/60/60);
             return h('div', null, [
                 h('p', null, [`Time spent on each category, last 7 days (total ${totalHours} h):`]),
                 h('pre', null, [viz ? viz : 'Nothing here yet – go do some stuff!' ]),
             ]);
         }

         function ShowHistory({ samples }) {
             return h('div', null, [
                 h('p', null, [ 'Log:' ]),
                 h('ul', null, [
                     ...samples.reverse().map(s => h('li', null, [dayjs(s.time).format() + ' ' + s.tag]))
                 ])
             ]);
         }


         function App() {
             const json = JSON.parse(window.localStorage.getItem('fr_samples'));
             const samples = List(json ?? []);


             // Render application contents.
             return h('main', null, [
                 h(TimeFraction, { samples }),
                 h(ShowHistory, { samples })
             ]);
         }

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);
        </script>
    </body>
</html>
