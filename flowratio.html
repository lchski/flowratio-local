<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Tracker</title>
        <style>
         .tagform {
           height: 10rem;
         }
        </style>
    </head>
    <body>
        <div id="app">Loading...</div>
        <script type="module">
         import { h, render, createContext } from 'https://unpkg.com/preact@latest?module';
         import { useState, useEffect, useRef } from 'https://unpkg.com/preact@latest/hooks/dist/hooks.module.js?module';
         import { List } from 'https://unpkg.com/immutable@latest?module';
         import dayjs from 'https://cdn.skypack.dev/dayjs';

         const DEV = new URLSearchParams(window.location.search).get('dev') === '1';
         if (DEV) {
             console.log('Running in development mode with more aggressive constants.');
         }

         const LAMBDA = DEV ? 10 : 45*60;  // Average number of seconds between pings.
         const AFK = DEV ? 10 : 60;  // Timeout on pings.
         const REFRESH_RATE = 1;  // Per second.

         const rexp = () => {
             // This is not strictly uniform in (0,1) but close enough.
             const u = Math.max(Number.EPSILON, Math.random());
             return -Math.log(u) * LAMBDA;
         };

         function SampleForm({ currentPing, currentTime, addSample }) {
             const [tagString, setTagString] = useState("woho");

             // Record sample on submission.
             const handleSubmit = (event, tagString) => {
                 event?.preventDefault();
                 if (currentPing) {
                     addSample(currentPing, tagString);
                 }
             };

             // Auto-record "afk" when no answer.
             useEffect(() => {
                 if (currentPing && currentTime > currentPing.add(AFK, 'seconds')) {
                     addSample(currentPing, 'afk');
                 }
             }, [currentTime, currentPing]);

             // Autofocus tag input.
             const tagInput = useRef(null);
             useEffect(() => {
                 tagInput.current?.focus();
             }, [ currentPing ]);
             const handleFocus = event => {
                 event.target.select();
             };

             if (! currentPing) {
                 return h('div', { class: 'tagform' }, [
                     'PENDING'
                 ]);
             } else {
                 return h('form', { class: 'tagform', onSubmit: ev => handleSubmit(ev, tagString) }, [
                     h('ul', null, [
                         h('li', null, [
                             h('label', { for: 'timebox' }, ['Time']),
                             h('input', {
                                 type: 'text',
                                 id: 'timebox',
                                 disabled: true,
                                 value: currentPing.format(),
                             }, []),
                         ]),
                         h('li', null, [
                             h('label', { for: 'tagbox' }, ['Tag']),
                             h('input', {
                                 type: 'text',
                                 id: 'tagbox',
                                 ref: tagInput,
                                 value: tagString,
                                 onInput: ev => setTagString(ev.target.value),
                                 onFocus: handleFocus,
                             }, [ ]),
                         ]),
                         h('li', null, [
                             h('button', { type: 'submit'  }, ['Enter'])
                         ]),
                     ])
                 ]);
             }
         }

         function ShowHistory({ csv, samples }) {
             return h('div', null, [
                 h('p', null, 'CSV: '),
                 h('button', { onClick: csv.export }, [ 'Export' ]),
                 h('button', { onClick: csv.import }, [ 'Import' ]),
                 h('ul', null, [
                     ...samples.map(s => h('li', null, [s.time.format() + ' ' + s.tag]))
                 ])
             ]);
         }

         function App() {

             // Manage notification permissions.
             const requestNotify = () => {
                 window.Notification.requestPermission()
                       .then(p => setNotifyAllowed(p === 'granted'));
             };
             const [notifyAllowed, setNotifyAllowed] =
                 useState(window.Notification.permission === 'granted');


             // Manage next ping time.
             const [pingTime, setPingTime] = useState(
                 () => window.localStorage.getItem('fr_nextping')
             );
             const setNextPing = (prevPing, currentTime) => {
                 let nextPing = prevPing.add(rexp(), 'seconds');
                 // If the next ping happened while a current ping was entered,
                 // automatically record it as a flowratio ping and generate a
                 // fresh ping.
                 if (nextPing > currentTime.add(1, 'seconds')) {
                     window.localStorage.setItem('fr_nextping', nextPing.format());
                     setPingTime(nextPing);
                 } else {
                     // JS does not seem to care about this cyclic dependency
                     // between setNextPing and addSample.
                     //
                     // Add a sample for entering tags, which will ensure a new
                     // ping time is set also.
                     addSample(nextPing, 'flowratio');
                 }
             }


             // Manage current time. This is the only code that should call
             // dayjs. Everything else should use currentTime.
             const [currentTime, setCurrentTime] = useState(dayjs());
             useEffect(() => {
                 window.setTimeout(() => {
                     setCurrentTime(dayjs());
                     // Make sure we have a ping time when running.
                     if (notifyAllowed && ! pingTime) {
                         setNextPing(dayjs(), dayjs());
                     }
                 }, 1000/REFRESH_RATE);
             }, [currentTime]);


             // Manage samples.
             //
             // Read samples from localStorage on page load and every time they
             // are modified. Only ever append to localStorage to avoid
             // clobbering a second tab if one happens to be running.
             //
             // In practise, this means `setSamples` is only allowed to be
             // called within `addSample`, so that the local samples state
             // and the localStorage samples do not diverge.
             const getSamples = () => {
                 return List(JSON.parse(window.localStorage.getItem('fr_samples')).map(s => {
                     return { ...s, time: dayjs(s.time)};
                 }));
             };
             const [samples, setSamples] = useState(getSamples);
             const addSample = (time, tag) => {
                 const moreSamples = getSamples().unshift({time, tag });
                 window.localStorage.setItem('fr_samples', JSON.stringify(moreSamples));
                 setSamples(moreSamples);
                 setNextPing(time, currentTime);
             };
             const csv = {
                 export: () => {
                     const data = new Blob([JSON.stringify(getSamples())], {type: 'text/plain'});
                     const a = document.createElement('a');
                     const url = window.URL.createObjectURL(data);
                     a.href = url;
                     a.download = 'flowratio.json';
                     document.body.appendChild(a);
                     a.click();
                     setTimeout(() => {
                         document.body.removeChild(a);
                         window.URL.revokeObjectURL(url);
                     });
                 },
                 import: () => {
                     alert('Not implemented');
                 },
             };


             // Manage ping notification.
             const currentPing = pingTime > currentTime ? null : pingTime;
             const [pingNotification, setPingNotification] = useState(null);
             useEffect(() => {
                 if (!pingNotification && currentPing) {
                     setPingNotification(new window.Notification(
                         'Snap read!', {
                             body: 'Click to tag what you are doing.',
                             requireInteraction: true,
                         }
                     ));
                 } else if (pingNotification && !currentPing) {
                     pingNotification.close();
                     setPingNotification(null);
                 }
             }, [currentPing]);


             // Render application contents.
             if (! notifyAllowed) {
                 return h('main', null, [
                     h('p', null, ['This app (by its nature) does not work without notifications.']),
                     h('button', { onClick: requestNotify }, [ 'Request notification permission ']),
                 ]);
             } else {
                 return h('main', null, [
                     h('p', null, ['Time ' + currentTime.format()]),
                     h(SampleForm, { currentPing, currentTime, addSample }),
                     h(ShowHistory, { csv, samples })
                 ]);
             }
         }

         // Clear out local storage when testing during development.
         if (DEV) {
             window.localStorage.setItem('fr_samples', JSON.stringify([]));
         }

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);
        </script>
    </body>
</html>
