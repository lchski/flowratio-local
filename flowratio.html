<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Tracker</title>
    </head>
    <body>
        <div id="app">Loading...</div>
        <script type="module">
         import { h, render, createContext } from 'https://unpkg.com/preact@latest?module';
         import { useState, useEffect, useRef } from 'https://unpkg.com/preact@latest/hooks/dist/hooks.module.js?module';
         import { List } from 'https://unpkg.com/immutable@latest?module';
         import dayjs from 'https://cdn.skypack.dev/dayjs';

         const KEY = 'fr_samples';
         const LAMBDA = 2;  // Average number of seconds between pings.
         const AFK = 10;  // Timeout on pings.

         function SampleForm({ currentPing, currentTime, addSample }) {
             const [tagString, setTagString] = useState("woho");

             // Record sample on submission.
             const handleSubmit = (event, tagString) => {
                 event?.preventDefault();
                 if (currentPing) {
                     addSample(currentPing, tagString);
                 }
             };

             // Auto-record "afk" when no answer.
             useEffect(() => {
                 if (currentPing && currentTime > currentPing.add(AFK, 'seconds')) {
                     addSample(currentPing, 'afk');
                 }
             });

             // Autofocus tag input.
             const tagInput = useRef(null);
             useEffect(() => {
                 tagInput.current?.focus();
             }, [ currentPing ]);
             const handleFocus = event => {
                 event.target.select();
             };

             if (! currentPing) {
                 return h('p', null, [
                     'PENDING'
                 ]);
             } else {
                 return h('form', { onSubmit: ev => handleSubmit(ev, tagString) }, [
                     h('ul', null, [
                         h('li', null, [
                             h('label', { for: 'timebox' }, ['Time']),
                             h('input', {
                                 type: 'text',
                                 id: 'timebox',
                                 disabled: true,
                                 value: currentPing.format(),
                             }, []),
                         ]),
                         h('li', null, [
                             h('label', { for: 'tagbox' }, ['Tag']),
                             h('input', {
                                 type: 'text',
                                 id: 'tagbox',
                                 ref: tagInput,
                                 value: tagString,
                                 onInput: ev => setTagString(ev.target.value),
                                 onFocus: handleFocus,
                             }, [ ]),
                         ]),
                         h('li', null, [
                             h('button', { type: 'submit'  }, ['Enter'])
                         ]),
                     ])
                 ]);
             }
         }

         function ShowHistory({ samples }) {
             return h('ul', null, [
                 ...samples.map(s => h('li', null, [s.time.format() + ' ' + s.tag]))
             ])
         }

         function App() {
             const requestNotify = () => {
                 window.Notification.requestPermission()
                       .then(p => setNotifyAllowed(p === 'granted'));
             };

             // Read samples from localStorage on page load and every time they
             // are modified. Only ever append to localStorage to avoid
             // clobbering a second tab if one happens to be running.
             //
             // In practise, this means `setSamples` is only allowed to be
             // called within `addSample`, so that the local samples state
             // and the localStorage samples do not diverge.
             const getSamples = () => {
                 return List(JSON.parse(window.localStorage.getItem(KEY)).map(s => {
                     return { ...s, time: dayjs(s.time)};
                 }));
             };
             const [samples, setSamples] = useState(getSamples);
             const addSample = (time, tag) => {
                 const moreSamples = getSamples().unshift({time, tag });
                 window.localStorage.setItem(KEY, JSON.stringify(moreSamples));
                 setSamples(moreSamples);
                 setPingTime(dayjs().add(LAMBDA, 'seconds'));
             };

             const [pingTime, setPingTime] = useState(null);
             const [currentTime, setCurrentTime] = useState(dayjs());
             const [notifyAllowed, setNotifyAllowed] =
                 useState(window.Notification.permission === 'granted');

             useEffect(() => {
                 window.setTimeout(() => {
                     setCurrentTime(dayjs());
                     // Make sure we have a ping time when running.
                     if (notifyAllowed && ! pingTime) {
                         setPingTime(dayjs().add(LAMBDA, 'seconds'));
                     }
                 }, 1000);
             }, [currentTime]);

             const currentPing = pingTime > currentTime ? null : pingTime;
             const [pingNotification, setPingNotification] = useState(null);

             useEffect(() => {
                 if (!pingNotification && currentPing) {
                     setPingNotification(new window.Notification(
                         'Snap read!', {
                             body: 'Click to tag what you are doing.',
                             tag: currentPing,
                             renotify: true,
                             requireInteraction: true,
                         }
                     ));
                 } else if (pingNotification && !currentPing) {
                     pingNotification.close();
                     setPingNotification(null);
                 }
             }, [currentPing]);

             if (! notifyAllowed) {
                 return h('main', null, [
                     h('p', null, ['This app (by its nature) does not work without notifications.']),
                     h('button', { onClick: requestNotify }, [ 'Request notification permission ']),
                 ]);
             } else {
                 return h('main', null, [
                     h('p', null, ['Time ' + currentTime.format()]),
                     h(SampleForm, { currentPing, currentTime, addSample }),
                     h(ShowHistory, { samples })
                 ]);
             }
         }

         window.localStorage.setItem(KEY, JSON.stringify([
         ]));

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);

         /*
          * await new Promise(r => setTimeout(r, 2000));
          * let noti =
          */
        </script>
    </body>
</html>
