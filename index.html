<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <title>FlowRatio Tracker</title>
        <link href="main.css" rel="stylesheet" />
    </head>
    <body>
        <header>
            <h1>FlowRatio Tracker</h1>
        </header>
        <main>
            <div id="app">Loading (this can take a few seconds the first time)...</div>
        </main>
        <footer>
            <p>Confused? Currently, <a href="https://git.sr.ht/~kqr/flowratio">the readme is
                the documentation</a>.</p>
        </footer>

        <script src="vendor/preact.umd.js"></script>
        <script src="vendor/preact-hooks.umd.js"></script>
        <script src="vendor/immutable.js"></script>
        <script src="vendor/dayjs.min.js"></script>
        <script type="module">
         const { h, render, createContext } = preact;
         const { useState, useEffect, useRef } = preactHooks;
         const { List } = Immutable;

         const DEV = new URLSearchParams(window.location.search).get('dev') === '1';
         if (DEV) {
             console.log('Running in development mode with more aggressive constants.');
         }
         const RESET = new URLSearchParams(window.location.search).get('clear') === '1';
         const LOG =  new URLSearchParams(window.location.search).get('log') === '1';;

         const LAMBDA = DEV ? 10 : 45*60;  // Average number of seconds between pings.
         const AFK = DEV ? 10 : 60;  // Timeout on pings.
         const REFRESH_RATE = 1;  // Per second.

         const Sample = (time, tag, lambda, namespace = null) => {
             return { time, tag, lambda, namespace };
         };

         const rexp = () => {
             // This is not strictly uniform in (0,1) but close enough.
             const u = Math.max(Number.EPSILON, Math.random());
             return -Math.log(u) * LAMBDA;
         };

         function SampleForm({ currentPing, currentTime, addSample, prevSample }) {
             const [tagString, setTagString] = useState( prevSample?.tag  ?? "" );

             // Record sample on submission.
             const handleSubmit = (event, tagString) => {
                 event?.preventDefault();
                 if (currentPing) {
                     if (LOG) console.log(`Adding sample ${tagString} on user request at ${currentTime.format()} with currentPing ${currentPing.format()}`);
                     addSample(currentPing, tagString);
                 }
             };

             // Auto-record "afk" when no answer.
             useEffect(() => {
                 if (currentPing && currentTime > currentPing.add(AFK, 'seconds')) {
                     if (LOG) console.log(`Auto-recording AFK at currentTime ${currentTime.format()} due to currentPing ${currentPing.format()}`);
                     addSample(currentPing, 'afk');
                 }
             }, [currentTime, currentPing]);

             // Autofocus tag input.
             const tagInput = useRef(null);
             useEffect(() => {
                 tagInput.current?.focus();
             }, [ currentPing ]);
             const handleFocus = event => {
                 event.target.select();
             };

             if (! currentPing) {
                 return h('div', { class: 'tagform' }, [
                     'PENDING'
                 ]);
             } else {
                 return h('form', { class: 'tagform', onSubmit: ev => handleSubmit(ev, tagString) }, [
                     h('ul', null, [
                         h('li', null, [
                             h('label', { for: 'timebox' }, ['Time']),
                                     h('input', {
                                         type: 'text',
                                         id: 'timebox',
                                         disabled: true,
                                         value: currentPing.format(),
                                     }, []),
                                 ]),
                                 h('li', null, [
                                     h('label', { for: 'tagbox' }, ['Tag']),
                                     h('input', {
                                         type: 'text',
                                         id: 'tagbox',
                                         ref: tagInput,
                                         value: tagString,
                                         onInput: ev => setTagString(ev.target.value),
                                         onFocus: handleFocus,
                                     }, [ ]),
                                 ]),
                                 h('li', null, [
                                     h('button', { type: 'submit'  }, ['Enter'])
                                 ]),
                             ])
                         ]);
                     }
                 }

                 function RecentSamples({ samples, updateTagString }) {
                     return h('div', { id: 'recent-samples' }, [
                         h('p', null, [ 'Last 10 samples:' ]),
                         h('ul', null, [
                             ...samples.reverse().take(10).map((s, idx) => h('li', null, [
                                 dayjs(s.time).format(),
                                 h('input', {
                                     type: 'text',
                                     value: s.tag,
                                     onInput: ev => updateTagString(ev.target.value, idx),
                                 }),
                             ]))
                         ])
                     ]);
                 }

                 function App() {

                     // Manage notification permissions.
                     const [notifyPermission, setNotifyPermission] =
                         useState(window.Notification.permission);
                     const notifyAllowed = notifyPermission === 'granted';
                     const requestNotifyPermission = () => {
                         window.Notification.requestPermission()
                               .then(p => setNotifyPermission(p));
                     };


                     // Manage namespace.
                     const [namespace, setNamespace] = useState(() => {
                         return window.localStorage.getItem('fr_namespace') ?? '';
                     });
                     const updateNamespace = (ns) => {
                         window.localStorage.setItem('fr_namespace', ns);
                         setNamespace(ns);
                     };


                     // Manage next ping time.
                     const [pingTime, setPingTime] = useState(() => {
                         const next = window.localStorage.getItem('fr_nextping');
                         return next ? dayjs(next) : null;
                     });
                     const setNextPing = (prevSample, currentTime) => {
                         if (! notifyAllowed) {
                             if (LOG) console.log(`Notify disallowed. Setting null ping time.`);
                             setPingTime(null);
                             return;
                         }

                         let samplesToAdd = [prevSample];
                         if (LOG) console.log(`Getting next ping while adding prevSample
                 ${prevSample.time.format()},${prevSample.tag} at currentTime ${currentTime.format()} with currentPing ${currentPing && currentPing.format()}`);
                         let nextPing = prevSample.time.add(rexp(), 'seconds');
                         if (LOG) console.log(`Attempting nextPing ${nextPing.format()} at currentTime ${currentTime.format()}`);
                         while (nextPing < currentTime.add(1, 'seconds')) {
                             if (LOG) console.log(`Tried nextPing ${nextPing.format()} in the past, at currentTime ${currentTime.format()}`);
                             // If the next ping is still in the past, add another
                             // missed ping.
                             //
                             // NOTE: Doing this in a loop is a very crude and
                             // inefficient implementation. If the user starts
                             // flowratio again after some months have passed
                             // it will spin and generate a lot of pings.
                             //
                             // It would be neater  to record T/t pings being
                             // missed, where T is time passed and t is time
                             // implied by lambda.
                             let nextTag = 'flowratio';
                             if (prevSample.tag === 'off') {
                                 nextTag = 'off';
                             } else if (prevSample.tag === 'afk') {
                                 nextTag = 'afk';
                             }
                             if (LOG) console.log(`Thanks to prevSample ${prevSample.tag}, adding a ${nextTag} sample.`);
                         samplesToAdd.push(Sample(nextPing, nextTag, LAMBDA, namespace));
                         nextPing = nextPing.add(rexp(), 'seconds');
                         if (LOG) console.log(`Attempting nextPing ${nextPing.format()} instead`);
                     }
                     addSamples(samplesToAdd);
                     // Once we're out of the loop, we have arrived at a future
                     // ping.
                     window.localStorage.setItem('fr_nextping', nextPing.format());
                     setPingTime(nextPing);
                 }


                 // Manage current time. This is the only code that should call
                 // dayjs. Everything else should use currentTime.
                 const [currentTime, setCurrentTime] = useState(dayjs());
                 useEffect(() => {
                     window.setTimeout(() => {
                         setCurrentTime(dayjs());
                         if (notifyAllowed && ! pingTime) {
                             // Make sure we have a ping time when running.
                             if (LOG) console.log(`Notify allowed but missing pingTime. Attempting setting a new one.`);
                             setNextPing(Sample(dayjs(), null, LAMBDA, namespace), dayjs());
                         } else if (pingTime && pingTime.add(2*AFK, 'seconds') < currentTime) {
                             // If ping time is more than twice AFK in the past,
                             // assume flowratio was off. This means some "off"
                             // states may be translated into "afk" on aggressive
                         // development settings, but it should be rare in
                         // real usage – also I can't think of a way to avoid it.
                         if (LOG) console.log(`Adding an OFF sample due to pingTime ${pingTime.format()} and currentTime ${currentTime.format()}.`);
                         setNextPing(Sample(pingTime, 'off', LAMBDA, namespace), dayjs());
                     }
                 }, 1000/REFRESH_RATE);
             }, [currentTime]);


             // Manage samples.
             //
             // Read samples from localStorage on page load and every time they
             // are modified. Only ever append to localStorage to avoid
             // clobbering a second tab if one happens to be running.
             //
             // In practise, this means `setSamples` is only allowed to be
             // called within `addSample`, so that the local samples state
             // and the localStorage samples do not diverge.
             const getSamples = () => {
                 const json = JSON.parse(window.localStorage.getItem('fr_samples'));
                 if (! json) {
                     return List([]);
                 } else {
                     return List(json.map(s => Sample(dayjs(s.time), s.tag, s.lambda, s.namespace)));
                 }
             };
             const dropSamples = () => {
                 window.localStorage.setItem('fr_samples', null);
             }
             const [samples, setSamples] = useState(getSamples);
             // This function is starting to look unnecessary...
             const addSample = (time, tag) => {
                 setNextPing(Sample(time, tag, LAMBDA, namespace), currentTime);
             };
             // Can be called with samples having null tag, which will be ignored.
             const addSamples = samples => {
                 // NOTE: Intentionally inefficient to be correct before the
                 // obvious optimisations are performed.
                 if (LOG) console.log(`Received list of ${samples.length} samples.`);
                 for (const sample of samples) {
                     if (sample.tag) {
                         if (LOG) console.log(`Pushing sample with tag ${sample.tag}.`);
                         const moreSamples = getSamples().push(sample);
                         window.localStorage.setItem('fr_samples', JSON.stringify(moreSamples));
                         setSamples(moreSamples);
                     }
                 }
             }
             const updateTagString = (str, revIdx) => {
                 setSamples(ss => {
                     const newSamples = ss.update(ss.size-revIdx-1, s => { return { ...s, tag: str }; });
                     window.localStorage.setItem('fr_samples', JSON.stringify(newSamples));
                     return newSamples;
                 });
             };
             // Manage last export time.
            const [lastExport, setLastExport] = useState(() => {
                const stored = window.localStorage.getItem('fr_last_export');
                return stored ? dayjs(stored) : null;
            });


            const csv = {
                 export: () => {
                     const csv = getSamples()
                         .sortBy(s => s.time)
                         .map(s => `${s.time.format()},${s.tag},${s.lambda},${s.namespace ?? ''}`)
                         .join('\n');
                     const filedata = new Blob(
                         ['time,tag,lambda,namespace\n' + csv],
                         { type: 'text/plain' }
                     );
                     const a = document.createElement('a');
                     const url = window.URL.createObjectURL(filedata);
                     a.href = url;
                     a.download = `flowratio-${namespace}-${dayjs().format('YYYY-MM-DDTHH-mm-ss')}.csv`;
                     document.body.appendChild(a);
                     a.click();
                     setTimeout(() => {
                         document.body.removeChild(a);
                         window.URL.revokeObjectURL(url);
                     });
                     const exportedAt = dayjs();
                     window.localStorage.setItem('fr_last_export', exportedAt.format());
                     setLastExport(exportedAt);
                 },
                 // Merges a CSV file into the existing samples, preserving all
                 // current data. Only one file can be imported at a time.
                 import: () => {
                     var input = document.createElement("input");
                     input.type = "file";
                     input.accept = '.csv,text/plain';
                     input.addEventListener('change', ev => {
                         const reader = new FileReader();
                         reader.onload = ev => {
                             const data = ev.target.result;
                             const rows = data.split('\n');

                             // Detect format version from the header row, supporting
                             // both the current (with namespace) and legacy formats.
                             const header = rows.shift();
                             const hasNamespace = header === 'time,tag,lambda,namespace';
                             if (!hasNamespace && header !== 'time,tag,lambda') {
                                 window.alert('Did not recognise file format');
                                 return;
                             }

                             // Build a lookup of already-stored records, keyed by
                             // namespace+timestamp, to detect duplicates. Null
                             // namespace is normalised to '' so it forms a valid key.
                             const existingKeys = new Set(
                                 getSamples()
                                     .filter(s => s.tag)
                                     .map(s => `${s.namespace ?? ''}|${s.time.toISOString()}`)
                                     .toArray()
                             );

                             // Parse all data rows into Sample objects, discarding
                             // any empty rows (e.g. from a trailing newline).
                             const incoming = rows
                                 .map(raw => {
                                     const fields = raw.split(',');
                                     return Sample(dayjs(fields[0]), fields[1], fields[2], hasNamespace ? (fields[3] || null) : null);
                                 })
                                 .filter(s => s.tag);

                             // Keep only records not already present in storage.
                             const newSamples = incoming.filter(s =>
                                 !existingKeys.has(`${s.namespace ?? ''}|${s.time.toISOString()}`)
                             );
                             const duplicateCount = incoming.length - newSamples.length;

                             addSamples(newSamples);

                             const parts = [`Imported ${newSamples.length} new record${newSamples.length !== 1 ? 's' : ''}.`];
                             if (duplicateCount > 0) {
                                 parts.push(`Skipped ${duplicateCount} duplicate${duplicateCount !== 1 ? 's' : ''} (same namespace and timestamp already in your data).`);
                             }
                             window.alert(parts.join(' '));
                         };
                         reader.readAsText(ev.target.files[0]);
                     });
                     input.dispatchEvent(new MouseEvent("click"));
                 },
             };


             // Manage ping notification.
             // We need to allow the ping to be active a little while after the
             // AFK expiration, to give the form a chance to auto-submit AFK.
             const currentlyEarly = pingTime > currentTime;
             const currentlyLate = pingTime && pingTime.add(AFK*1.5, 'seconds') < currentTime;
             const currentPing = currentlyEarly || currentlyLate ? null : pingTime;
             const [pingNotification, setPingNotification] = useState(null);
             useEffect(() => {
                 if (!pingNotification && currentPing) {
                     setPingNotification(new window.Notification(
                         'Snap read!', {
                             body: 'Click to tag what you are doing.',
                             requireInteraction: true,
                         }
                     ));
                 } else if (pingNotification && !currentPing) {
                     pingNotification.close();
                     setPingNotification(null);
                 }
             }, [currentPing]);


             // Determine whether to show an export reminder.
            const daysSinceExport = lastExport ? currentTime.diff(lastExport, 'day') : null;
            const needsExport = samples.size > 0 && (daysSinceExport === null || daysSinceExport >= 5);


            // Render application contents.
             const requestButton =
                 notifyPermission === 'denied'
                 ? h('p', null, ['You have blocked notifications. Unblock them in your browser and refresh the page to use this app.'])
                 : h('button', { onClick: requestNotifyPermission }, [ 'Request notification permission ']);

             const sampleForm = h(SampleForm, {
                 currentPing,
                 currentTime,
                 addSample,
                 prevSample: samples
                     .filter(s => s.tag !== 'off' && s.tag !== 'afk' &&
                               s.tag !== 'flowratio')
                     .last()
             });

                     const csvButtons = h('div', {id: 'csv-export'}, [
                         h('p', null, 'CSV: '),
                         h('button', { onClick: csv.export, disabled: !samples.size }, [ 'Export' ]),
                         h('button', { onClick: csv.import }, [ 'Import' ]),
                     ]);

             const namespaceInput = h('div', { id: 'namespace-setting' }, [
                 h('label', { for: 'namespace' }, ['Namespace']),
                 h('input', {
                     type: 'text',
                     id: 'namespace',
                     value: namespace,
                     onInput: ev => updateNamespace(ev.target.value),
                     placeholder: 'e.g. work-laptop',
                 }, []),
             ]);

             const exportReminder = needsExport && h('p', { class: 'export-reminder' }, [
                 daysSinceExport === null
                     ? "You haven't exported your data yet. "
                     : `It's been ${daysSinceExport} day${daysSinceExport !== 1 ? 's' : ''} since your last export. `,
                 h('button', { onClick: csv.export }, ['Export now']),
             ]);

             return h('main', null, [
                 notifyPermission === 'granted' ? sampleForm : requestButton,
                 namespaceInput,
                 h('p', null, [
                     h('a', { target: '_BLANK', href: 'report.html' }, ['View report']),
                 ]),
                 ...(needsExport ? [exportReminder] : []),
                 csvButtons,
                ...( samples.size ? [h(RecentSamples, { samples, updateTagString })] : [])
             ]);
         }

         // Clear out local storage when testing during development.
         if (RESET) {
             console.log('Resetting local storage');
             window.localStorage.setItem('fr_samples', JSON.stringify([]));
             window.localStorage.setItem('fr_nextping', '');
             window.localStorage.setItem('fr_last_export', '');
         }

         const appDiv = document.getElementById('app');
         appDiv.removeChild(appDiv.childNodes[0]);
         render(h(App, null), appDiv);
        </script>
    </body>
</html>
